name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gatherly
          POSTGRES_PASSWORD: gatherly_dev
          POSTGRES_DB: gatherly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://gatherly:gatherly_dev@localhost:5432/gatherly

      - name: Lint Frontend
        run: npm run lint --workspace=frontend

      - name: Build Backend
        run: npm run build --workspace=backend

      - name: Build Frontend
        run: npm run build --workspace=frontend
